# Available values:
# - local_no_clearml: run locally without creating a ClearML task
# - local_clearml: run locally and log metrics/artifacts to ClearML
# - remote_clearml: run through a ClearML agent on the selected queue
run_mode: remote_clearml

clearml:
  project_name: Custom/MNIST
  task_name: BWResNet18_Training
  queue_name: 1xGPU
  docker_image: ""
  docker_arguments: --ipc=host --gpus all

data:
  local_dataset_path: ""
  dataset_id: ""

model:
  local_weights_path: ""
  clearml_model_id: ""  # optional: download this ClearML model and use it as the initial checkpoint

training:
  batch_size: 64
  num_epochs: 5
  lr: 0.001
  momentum: 0.9
  resume_training: True
  resume_task_id: ""  # optional: use a specific ClearML task id as the resume source
  num_workers: 2
  image_size: 224
  mean: 0.5
  std: 0.5
  pretrained: true
  hid_lay_size: 100
  dropout: 0.1
  artifacts_dir: artifacts
